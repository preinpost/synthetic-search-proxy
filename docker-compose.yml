services:
  search-proxy:
    build: .
    # Or pull the prebuilt image instead of build:
    # image: ghcr.io/OWNER/open-webui-search-proxy:latest
    ports:
      - "8000:8000"
    environment:
      SYNTHETIC_API_KEY: ${SYNTHETIC_API_KEY}
      PROXY_KEY: ${PROXY_KEY}
    restart: unless-stopped
